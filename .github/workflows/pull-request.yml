name: Run tests before merging
permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master

jobs:
  matrix:
    strategy:
      max-parallel: 2
      matrix:
        os: [macos-latest, ubuntu-latest, windows-11-arm, windows-latest]
    name: 'Tests'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24.14.1'
          registry-url: https://registry.npmjs.org/
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: ${{ case(matrix.os == 'windows-11-arm', 'v2.6.10', 'v2.5.7') }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'microsoft'
          java-version: '21'
      - name: Output rust version
        run: rustup --version
      - name: Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            cmocka-build
            ecmascript/build
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --all-features
        name: 'Run clippy with all features'
      - run: cargo test --all-features
        name: 'Test with all features'
      - run: cargo build --all-features
        name: 'Build with all features'
      - run: sudo apt-get install -y libcmocka-dev
        name: 'Install cmocka (Ubuntu)'
        if: ${{ matrix.os == 'ubuntu-latest' }}
      - name: 'Download and build cmocka from source'
        if: ${{ matrix.os == 'macos-latest' || matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm' }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://cmocka.org/files/1.1/cmocka-1.1.8.tar.xz' -OutFile "$env:GITHUB_WORKSPACE/cmocka.tar.xz"
          $hash = (Get-FileHash "$env:GITHUB_WORKSPACE/cmocka.tar.xz" -Algorithm SHA384).Hash.ToLower()
          if ($hash -ne '5f50b2e900a68b4340d5b0de09602e69428a56fe47722f4f6a6c81d16bfc7c869e2f19b5d72806a1d5d715329affb1c2') {
            throw "SHA-384 mismatch: $hash"
          }
          cmake -E tar xf "$env:GITHUB_WORKSPACE/cmocka.tar.xz"
          cmake -S "$env:GITHUB_WORKSPACE/cmocka-1.1.8" -B "$env:GITHUB_WORKSPACE/cmocka-build" -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE/cmocka-install" -DWITH_EXAMPLES=OFF
          cmake --build "$env:GITHUB_WORKSPACE/cmocka-build" --config Release
          cmake --install "$env:GITHUB_WORKSPACE/cmocka-build" --config Release
      - name: 'Build and run C binding tests'
        shell: pwsh
        working-directory: ./ecmascript
        run: |
          function New-TemporaryDirectory {
            $parent = [System.IO.Path]::GetTempPath()
            $name = [System.IO.Path]::GetRandomFileName()
            New-Item -ItemType Directory -Path (Join-Path $parent $name)
          }
          $build_dir = New-TemporaryDirectory
          if ('${{ matrix.os }}'.StartsWith('windows')) {
            cmake -S "$env:GITHUB_WORKSPACE/wasm/test" -B "$build_dir" -DCMAKE_PREFIX_PATH="$env:GITHUB_WORKSPACE/cmocka-install" -DCMAKE_VERBOSE_MAKEFILE=ON
            cmake --build "$build_dir" --config Debug
            $env:PATH = "$env:GITHUB_WORKSPACE\cmocka-install\bin;$env:GITHUB_WORKSPACE\target\debug;$env:PATH"
            & "$build_dir/src/Debug/sha2_cavs_tests.exe"
          } elseif ('${{ matrix.os }}' -eq 'macos-latest') {
            cmake -S "$env:GITHUB_WORKSPACE/wasm/test" -B "$build_dir" -DCMAKE_PREFIX_PATH="$env:GITHUB_WORKSPACE/cmocka-install" -DCMAKE_VERBOSE_MAKEFILE=ON
            cmake --build "$build_dir"
            & "$build_dir/src/sha2_cavs_tests"
          } else {
            cmake -S "$env:GITHUB_WORKSPACE/wasm/test" -B "$build_dir" -DCMAKE_VERBOSE_MAKEFILE=ON
            cmake --build "$build_dir"
            & "$build_dir/src/sha2_cavs_tests"
          }
      - name: 'Build and run C binding tests (s390x)'
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        working-directory: ./ecmascript
        run: |
          set -xe
          sudo dpkg --add-architecture s390x
          printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports\nSuites: %s %s-updates\nComponents: main restricted universe\nArchitectures: s390x\nSigned-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg\n' "$(lsb_release -sc)" "$(lsb_release -sc)" | sudo tee '/etc/apt/sources.list.d/ubuntu-s390x.sources'
          sudo apt-get update ||:
          sudo apt-get install -y libcmocka-dev:s390x crossbuild-essential-s390x qemu-user-static
          rustup target add s390x-unknown-linux-gnu
          export CARGO_TARGET_S390X_UNKNOWN_LINUX_GNU_LINKER=s390x-linux-gnu-gcc
          cargo build --frozen --lib --target s390x-unknown-linux-gnu --profile dev --package wasm-sha2 --all-features
          export CC=s390x-linux-gnu-gcc CXX=s390x-linux-gnu-g++
          export build_dir="$(mktemp -d)"
          cmake -S "$GITHUB_WORKSPACE/wasm/test" -B "$build_dir" -DCMAKE_VERBOSE_MAKEFILE=ON -DCROSS_TARGET=s390x-unknown-linux-gnu
          cmake --build "$build_dir"
          exec qemu-s390x-static "$build_dir"/src/sha2_cavs_tests
      - run: rustup target add wasm32v1-none
      - run: npm ci
        working-directory: ./ecmascript
      - run: npm run lint
        name: 'ES Lint'
        working-directory: ./ecmascript
      - run: npm test
        name: 'Test with Node.js'
        working-directory: ./ecmascript
        env:
          FEATURES: 'sha256,sha384,serialize,deserialize'
      - run: deno test --sloppy-imports --allow-read=tests/vectors
        name: 'Test with Deno'
        working-directory: ./ecmascript/.test-harness
        # Deno fails with:
        # > Nested Deno.test() calls are not supported.
        # > Use t.step() for nested tests.
        # See <https://github.com/denoland/deno/issues/21679>
        if: ${{ matrix.os != 'windows-11-arm' }}
      - run: bun test api sha256 sha384
        name: 'Test with Bun'
        working-directory: ./ecmascript/.test-harness
      - run: find dist -name '*.mjs' -o -name '*.cjs' -exec sha384sum {} + && find build -name 'wasm_sha2.wasm'  -exec sha384sum {} +
        name: Digests of generated assets
        working-directory: ./ecmascript
        if: ${{ matrix.os == 'macos-latest' || matrix.os == 'ubuntu-latest' }}
