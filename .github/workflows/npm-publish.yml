# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    environment: CI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24.14.1'
          registry-url: https://registry.npmjs.org/
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: 'v2.5.7'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'microsoft'
          java-version: '21'
      - name: Output rust version
        run: rustup --version
      - name: Cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --all-features
        name: 'Run clippy with all features'
      - run: cargo test --all-features
        name: 'Test with all features'
      - run: cargo build --all-features
        name: 'Build with all features'
      - run: sudo apt-get install -y libcmocka-dev
        name: 'Install cmocka (Ubuntu)'
      - run: cmake -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON ..
        name: 'Create CMake build system'
        working-directory: ./wasm/test/build
      - run: cmake --build build
        name: 'Build C binding tests'
        working-directory: ./wasm/test
      - run: ../wasm/test/build/src/sha2_cavs_tests
        name: 'Run C binding tests'
        working-directory: ./ecmascript
      - run: rustup target add wasm32v1-none
      - run: npm ci
        working-directory: ./ecmascript
      - run: npm run lint
        name: 'ES Lint'
        working-directory: ./ecmascript
      - run: npm run build
        name: 'Build with npm'
        working-directory: ./ecmascript
      - run: npm test -- --no-build
        name: 'Test with Node.js'
        working-directory: ./ecmascript
      - run: deno test --sloppy-imports --allow-read=tests/vectors
        name: 'Test with Deno'
        working-directory: ./ecmascript/.test-harness
      - run: bun test
        name: 'Test with Bun'
        working-directory: ./ecmascript/.test-harness
      - run: find dist -name '*.mjs' -o -name '*.cjs' -exec sha384sum {} + && find build -name 'wasm_sha2.wasm'  -exec sha384sum {} +
        name: Digests of generated assets
        working-directory: ./ecmascript
      - run: npm publish --provenance --access public
        working-directory: ./ecmascript/dist
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
